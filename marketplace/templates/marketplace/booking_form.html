{% extends 'marketplace/base.html' %}
{% block title %}Request Visit{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-3">Request a visit for {{ listing.title }}</h2>
                <form method="post">{% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-success">Send Request</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
